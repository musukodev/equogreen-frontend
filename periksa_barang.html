<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Periksa Barang - Equogreen</title>
    <!-- Using Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            sidebar: '#3a5a40', /* Sidebar Dark Green */
                            topbar: '#7a9675', /* Topbar Olive Green */
                            bg: '#f8f6f0', /* Main Content Background */
                            main: '#3a5a40', /* Main Green for buttons */
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Custom Input Styling to match design */
        .form-input {
            width: 100%;
            border: 1px solid #4b5563;
            /* gray-600 */
            border-radius: 0.375rem;
            /* rounded-md */
            padding: 0.5rem 0.75rem;
            color: #1f2937;
            /* gray-800 */
            background-color: #ffffff;
            outline: none;
            transition: border-color 0.15s ease-in-out;
        }

        .form-input:focus {
            border-color: #3a5a40;
            box-shadow: 0 0 0 2px rgba(58, 90, 64, 0.2);
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 0;
            color: white;
            font-weight: 700;
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
            transition: opacity 0.2s;
        }

        .menu-item:hover {
            opacity: 0.8;
        }

        .menu-item i {
            width: 1.5rem;
            text-align: center;
            font-size: 1.25rem;
        }
    </style>
</head>

<body class="flex h-screen overflow-hidden antialiased text-gray-800 bg-brand-bg">

    <!-- Sidebar -->
    <aside class="w-64 bg-brand-sidebar flex flex-col flex-shrink-0">
        <!-- Logo -->
        <div class="h-32 flex items-center justify-center p-4 mt-2">
            <!-- Image Logo from the user -->
            <img src="logo.png" alt="Equogreen Quotation Logo">
        </div>

        <!-- Navigation Menu -->
        <nav class="flex-1 px-6 mt-4 flex flex-col gap-2">
            <a href="dashboard" class="menu-item opacity-80 hover:opacity-100">
                <i class="fa-solid fa-shapes"></i>
                <span>Dashboard</span>
            </a>
            <a href="batch_barang" class="menu-item opacity-100"> <!-- active menu item styling -->
                <i class="fa-solid fa-database"></i>
                <span>Batch Barang</span>
            </a>
            <a href="#" class="menu-item">
                <div class="relative">
                    <i class="fa-regular fa-bell"></i>
                    <i
                        class="fa-solid fa-plus absolute -bottom-1 -right-1 text-[10px] bg-brand-sidebar rounded-full"></i>
                </div>
                <span>Kelola Notifikasi</span>
            </a>
        </nav>
    </aside>

    <!-- Main Content wrapper -->
    <div class="flex-1 flex flex-col h-screen overflow-hidden">

        <!-- Topbar -->
        <header
            class="bg-brand-topbar flex flex-col justify-between px-8 pt-8 pb-0 text-white flex-shrink-0 border-b border-[#6a8c66]">
            <!-- Top section: Title & User Actions -->
            <div class="flex items-start justify-between">
                <!-- Left: Title & Back -->
                <div class="flex items-start gap-4">
                    <a href="batch_barang" class="text-white hover:text-gray-200 transition mt-1">
                        <i class="fa-regular fa-circle-left text-3xl font-light"></i>
                    </a>
                    <div class="leading-tight">
                        <h1 class="text-3xl font-bold mb-1">Batch Barang</h1>
                        <p class="text-base text-gray-100">2026</p>
                    </div>
                </div>

                <!-- Right: User Actions -->
                <div class="flex items-center gap-4 text-3xl">
                    <a href="#" class="hover:text-gray-200 transition">
                        <i class="fa-solid fa-circle-user"></i>
                    </a>
                    <a href="#" class="hover:text-gray-200 transition">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    </a>
                </div>
            </div>

            <!-- Tabs Area -->
            <div class="flex gap-8 mt-6">
                <!-- Inactive Tab -->
                <a href="batch_barang"
                    class="font-medium text-[#d3e0d1] hover:text-white pb-2 border-b-2 border-transparent hover:border-white transition">Buat
                    Batch</a>
                <!-- Active Tab -->
                <a href="periksa_barang" class="font-medium text-white pb-2 border-b-2 border-white">Periksa Barang</a>
            </div>
        </header>

        <!-- Main Workspace -->
        <main class="flex-1 overflow-y-auto w-full p-8 relative">
            <div class="max-w-4xl mx-auto flex flex-col pt-2">

                <!-- Controls Row 1: Search -->
                <div class="flex justify-end mb-6">
                    <div class="w-64">
                        <input type="text" placeholder="Search"
                            class="form-input rounded-lg border-gray-400 py-1.5 focus:border-brand-main focus:ring-0 shadow-sm" />
                    </div>
                </div>

                <!-- Controls Row 2: Select Dropdowns -->
                <div class="flex gap-6 mb-8">
                    <!-- Dropdown Batch -->
                    <div class="relative w-44">
                        <select class="form-input appearance-none bg-white font-medium cursor-pointer">
                            <option>Batch 1</option>
                            <option>Batch 2</option>
                            <option>Batch 3</option>
                        </select>
                        <div
                            class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500">
                            <i class="fa-solid fa-chevron-down text-sm"></i>
                        </div>
                    </div>

                    <!-- Dropdown Kategori -->
                    <div class="relative w-44">
                        <select class="form-input appearance-none bg-white font-medium cursor-pointer">
                            <option>ATK</option>
                            <option>Elektronik</option>
                            <option>Furniture</option>
                        </select>
                        <div
                            class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500">
                            <i class="fa-solid fa-chevron-down text-sm"></i>
                        </div>
                    </div>
                </div>

                <!-- Data Table -->
                <div class="overflow-x-auto bg-white">
                    <table class="w-full border-collapse">
                        <thead>
                            <tr>
                                <th
                                    class="border border-gray-600 px-4 py-3.5 font-medium text-center w-1/3 bg-white text-gray-800">
                                    Nama Vendor</th>
                                <th
                                    class="border border-gray-600 px-4 py-3.5 font-medium text-center w-1/3 bg-white text-gray-800">
                                    Quotation</th>
                                <th
                                    class="border border-gray-600 px-4 py-3.5 font-medium text-center w-1/3 bg-white text-gray-800">
                                    Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Row 1 -->
                            <tr class="hover:bg-gray-50 transition">
                                <td class="border border-gray-600 px-4 py-4 text-center text-sm font-medium">ATK Corp.
                                </td>
                                <td class="border border-gray-600 px-4 py-4 text-center">
                                    <a href="#"
                                        class="text-blue-500 underline hover:text-blue-700 transition font-medium">Cek</a>
                                </td>
                                <td class="border border-gray-600 px-4 py-4 text-center text-xl">
                                    <div class="flex items-center justify-center gap-4">
                                        <button class="text-[#87c55c] hover:text-[#5d8b3d] transition outline-none"
                                            title="Terima">
                                            <i class="fa-solid fa-check"></i>
                                        </button>
                                        <button
                                            class="text-red-500 hover:text-red-700 font-bold ml-2 transition outline-none"
                                            title="Tolak">
                                            <i class="fa-solid fa-xmark"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>

                            <!-- Row 2 -->
                            <tr class="hover:bg-gray-50 transition">
                                <td class="border border-gray-600 px-4 py-4 text-center text-sm font-medium">Pusat ATK
                                </td>
                                <td class="border border-gray-600 px-4 py-4 text-center">
                                    <a href="#"
                                        class="text-blue-500 underline hover:text-blue-700 transition font-medium">Cek</a>
                                </td>
                                <td class="border border-gray-600 px-4 py-4 text-center text-xl">
                                    <div class="flex items-center justify-center gap-4">
                                        <button class="text-[#87c55c] hover:text-[#5d8b3d] transition outline-none"
                                            title="Terima">
                                            <i class="fa-solid fa-check"></i>
                                        </button>
                                        <button
                                            class="text-red-500 hover:text-red-700 font-bold ml-2 transition outline-none"
                                            title="Tolak">
                                            <i class="fa-solid fa-xmark"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </main>
    </div>

</body>

</html>
