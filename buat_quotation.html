<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Quotation Modern</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #eebc8d;
            --accent-blue: #003380;
            --accent-black: #1a1a1a;
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.3);
            --text-main: #2d2d2d;
            --input-bg: rgba(255, 255, 255, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5d5b5 0%, #eebc8d 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: var(--text-main);
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            width: 100%;
            max-width: 850px;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .header-box {
            background: rgba(0, 0, 0, 0.05);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 32px;
            border-left: 4px solid var(--accent-black);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .deadline-label {
            font-weight: 700;
            color: var(--accent-black);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .deadline-value {
            font-weight: 500;
            font-size: 1rem;
        }

        .section-title {
            font-weight: 700;
            font-size: 1.25rem;
            margin-bottom: 20px;
            color: var(--accent-black);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Table Styling */
        .table-wrapper {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 32px;
            border: 1px solid var(--glass-border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: rgba(0, 0, 0, 0.03);
            padding: 16px;
            text-align: left;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--accent-black);
            border-bottom: 1px solid var(--glass-border);
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        tr:last-child td {
            border-bottom: none;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid transparent;
            border-radius: 10px;
            background: var(--input-bg);
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            color: var(--text-main);
        }

        input:focus {
            outline: none;
            background: white;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px rgba(0, 51, 128, 0.1);
        }

        input::placeholder {
            color: rgba(0, 0, 0, 0.3);
        }

        /* Button Group */
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .btn {
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-black {
            background: var(--accent-black);
            color: white;
        }

        .btn-blue {
            background: var(--accent-blue);
            color: white;
            grid-column: span 2;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
            filter: brightness(1.1);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Footer */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
            border-top: 1px solid var(--glass-border);
            font-size: 0.9rem;
        }

        .footer-link {
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .footer-link span {
            font-weight: 700;
            color: var(--accent-blue);
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 24px;
            }

            .button-group {
                grid-template-columns: 1fr;
            }

            .btn-blue {
                grid-column: span 1;
            }

            th {
                display: none;
            }

            td {
                display: block;
                padding: 8px 0;
            }

            td::before {
                content: attr(data-label);
                font-weight: 600;
                font-size: 0.8rem;
                margin-bottom: 4px;
                display: block;
                color: var(--accent-black);
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header-box">
            <span class="deadline-label">Tenggat Waktu:</span>
            <span class="deadline-value">Selasa, 12 Februari 2026, 11:20</span>
        </div>

        <div class="section-title">
            <span>📋</span> Deskripsi Spesifikasi Barang
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th style="width: 35%;">Nama Barang</th>
                        <th style="width: 45%;">Spesifikasi</th>
                        <th style="width: 20%;">Jumlah</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td data-label="Nama Barang"><input type="text" placeholder="Contoh: Laptop"></td>
                        <td data-label="Spesifikasi"><input type="text" placeholder="Contoh: i7, 16GB RAM"></td>
                        <td data-label="Jumlah"><input type="number" value="0" min="0"></td>
                    </tr>
                    <tr>
                        <td data-label="Nama Barang"><input type="text" placeholder="..."></td>
                        <td data-label="Spesifikasi"><input type="text" placeholder="..."></td>
                        <td data-label="Jumlah"><input type="number" value="0" min="0"></td>
                    </tr>
                    <tr>
                        <td data-label="Nama Barang"><input type="text" placeholder="..."></td>
                        <td data-label="Spesifikasi"><input type="text" placeholder="..."></td>
                        <td data-label="Jumlah"><input type="number" value="0" min="0"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="button-group">
            <button class="btn btn-black">
                <span>📥</span> Unduh Form
            </button>
            <button class="btn btn-black">
                <span>📤</span> Unggah Form
            </button>
            <button class="btn btn-blue">
                <span>🚀</span> Kirim Quotation
            </button>
        </div>

        <div class="footer">
            <a href="#" class="footer-link">
                Tata cara quotation <span>Unduh</span>
            </a>
            <div style="opacity: 0.5; font-size: 0.8rem;">v2.0 Modern UI</div>
        </div>
    </div>

</body>

</html>
