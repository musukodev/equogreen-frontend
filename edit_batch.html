<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Batch - Equogreen</title>
    <!-- Using Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            sidebar: '#3a5a40', /* Sidebar Dark Green */
                            topbar: '#7a9675', /* Topbar Olive Green */
                            bg: '#f8f6f0', /* Main Content Background */
                            main: '#3a5a40', /* Main Green for buttons */
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Custom Input Styling to match design */
        .form-input {
            width: 100%;
            border: 1px solid #4b5563;
            /* gray-600 */
            border-radius: 0.375rem;
            /* rounded-md */
            padding: 0.5rem 0.75rem;
            color: #1f2937;
            /* gray-800 */
            background-color: #ffffff;
            outline: none;
            transition: border-color 0.15s ease-in-out;
        }

        .form-input:focus {
            border-color: #3a5a40;
            box-shadow: 0 0 0 2px rgba(58, 90, 64, 0.2);
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 0;
            color: white;
            font-weight: 700;
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
            transition: opacity 0.2s;
        }

        .menu-item:hover {
            opacity: 0.8;
        }

        .menu-item i {
            width: 1.5rem;
            text-align: center;
            font-size: 1.25rem;
        }
    </style>
</head>

<body class="flex h-screen overflow-hidden antialiased text-gray-800 bg-brand-bg">

    <!-- Sidebar -->
    <aside class="w-64 bg-brand-sidebar flex flex-col flex-shrink-0">
        <!-- Logo -->
        <div class="h-32 flex items-center justify-center p-4 mt-2">
            <!-- Image Logo from the user -->
            <img src="logo.png" alt="Equogreen Quotation Logo">
        </div>

        <!-- Navigation Menu -->
        <nav class="flex-1 px-6 mt-4 flex flex-col gap-2">
            <!-- Menghindari link ke dashboard akun lain -->
            <a href="#" class="menu-item opacity-80 hover:opacity-100">
                <i class="fa-solid fa-shapes"></i>
                <span>Dashboard</span>
            </a>
            <a href="batch_barang.html" class="menu-item opacity-100">
                <i class="fa-solid fa-database"></i>
                <span>Batch Barang</span>
            </a>
            <a href="#" class="menu-item opacity-80 hover:opacity-100">
                <div class="relative">
                    <i class="fa-regular fa-bell"></i>
                    <i class="fa-solid fa-plus absolute -bottom-1 -right-1 text-[10px] bg-brand-sidebar rounded-full"></i>
                </div>
                <span>Kelola Notifikasi</span>
            </a>
        </nav>
    </aside>

    <!-- Main Content wrapper -->
    <div class="flex-1 flex flex-col h-screen overflow-hidden">

        <!-- Topbar -->
        <header class="bg-brand-topbar h-32 flex items-center justify-between px-8 text-white flex-shrink-0">
            <!-- Left: Title & Back -->
            <div class="flex items-center gap-4">
                <a href="batch_barang.html" class="text-white hover:text-gray-200 transition">
                    <i class="fa-regular fa-circle-left text-4xl font-light"></i>
                </a>
                <div class="leading-tight mt-1">
                    <h1 class="text-3xl font-bold">Batch 1</h1>
                    <p class="text-lg">2026</p>
                </div>
            </div>

            <!-- Right: User Actions -->
            <div class="flex items-center gap-4 text-3xl">
                <a href="#" class="hover:text-gray-200 transition">
                    <i class="fa-solid fa-circle-user"></i>
                </a>
                <a href="#" class="hover:text-gray-200 transition">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                </a>
            </div>
        </header>

        <!-- Main Workspace -->
        <main class="flex-1 overflow-y-auto w-full p-8 relative">
            <div class="max-w-4xl mx-auto">

                <!-- Form Area -->
                <form action="batch_barang.html" class="space-y-6">

                    <!-- Atur Tanggal -->
                    <div>
                        <label class="block text-gray-800 mb-1.5 font-medium">Atur Tanggal</label>
                        <input type="date" placeholder="dd/mm/yyyy" class="form-input">
                    </div>

                    <!-- Atur Waktu -->
                    <div>
                        <label class="block text-gray-800 mb-1.5 font-medium">Atur Waktu</label>
                        <input type="time" value="00.00" class="form-input">
                    </div>

                    <!-- Jumlah Kategori -->
                    <div>
                        <label class="block text-gray-800 mb-1.5 font-medium">Jumlah Kategori</label>
                        <input type="number" value="1" class="form-input w-24">
                    </div>

                    <!-- Kategori -->
                    <div>
                        <div class="relative w-40">
                            <select class="form-input appearance-none bg-white">
                                <option>Kategori</option>
                            </select>
                            <div
                                class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-600">
                                <i class="fa-solid fa-chevron-down text-sm"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Deskripsi Spesifikasi Barang -->
                    <div>
                        <label class="block text-gray-800 mb-1.5 font-medium">Deskripsi Spesifikasi Barang</label>
                        <textarea rows="5" class="form-input resize-none"></textarea>
                    </div>

                    <!-- Action Buttons - Hanya Kirim yang tersisa sesuai arahan -->
                    <div class="pt-6 flex justify-end items-center">
                        <button type="submit"
                            class="px-12 py-1.5 bg-[#3a5a40] border border-[#3a5a40] rounded text-white font-bold hover:bg-[#2c4431] transition shadow-sm">
                            Kirim
                        </button>
                    </div>

                </form>
            </div>
        </main>
    </div>

</body>

</html>
